apiVersion: v1
kind: ConfigMap
metadata:
  name: reset-config-default-test-8x8    # The value of JobName must be the same as the name attribute of the following job. The prefix fault-config- cannot be modified.
  namespace: default                      # Name Space must be set to "default"
  labels:
    reset: "true"
data:
  reset.json: |
    {
        "status":"initializing"
    }
  checkCode: ""
---
apiVersion: mindxdl.gitee.com/v1
kind: AscendJob
metadata:
  name: default-test-8x8
  labels:
    framework: pytorch
    tor-affinity: "null" #该标签为任务是否使用交换机亲和性调度标签，null或者不写该标签则不适用。large-model-schema表示大模型任务，normal-schema 普通任务
    fault-scheduling: force # 开启重调度模式，force为故障强制删除pod
    fault-retry-times: "3" # 开启业务面故障的无条件重试能力，'3'为最大重试次数；同时需要将容器重启策略设置为Never
    pod-rescheduling: "on"   # 开启Pod级重调度
    subHealthyStrategy: "ignore"
    ring-controller.atlas: ascend-910b
spec:
  schedulerName: volcano   # work when enableGangScheduling is true
  runPolicy:
    schedulingPolicy:      # work when enableGangScheduling is true
      minAvailable: 8
      queue: default
  successPolicy: AllWorkers
  replicaSpecs:
    Master:
      replicas: 1
      restartPolicy: Never
      template:
        metadata:
          labels:
            ring-controller.atlas: ascend-910b
        spec:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: job-name
                        operator: In
                        values:
                          - default-test-pytorch
                  topologyKey: kubernetes.io/hostname
          nodeSelector:
            host-arch: huawei-arm
            accelerator-type: module-910b-8
          containers:
            - name: ascend # do not modify
              image: ubuntu:22.04
              imagePullPolicy: IfNotPresent
              env:
                - name: POD_IP
                  valueFrom:
                    fieldRef:
                      fieldPath: status.podIP
                - name: XDL_IP                   # IP address of the physical node, which is used to identify the node where the pod is running
                  valueFrom:
                    fieldRef:
                      fieldPath: status.hostIP
                # ASCEND_VISIBLE_DEVICES env variable is used by ascend-docker-runtime when in the whole card scheduling scene with volcano scheduler. please delete it when in the static vNPU scheduling scene or without volcano.
                - name: ASCEND_VISIBLE_DEVICES
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['huawei.com/Ascend910']               # The value must be the same as resources.requests
                # 内存仿真配置
                - name: PYTORCH_NPU_ALLOC_CONF
                  value: expandable_segments:False
              command:                           # training command, which can be modified
                - /bin/bash
                - -c
              args: [ "sleep 100000; " ]
              ports:                          # default value containerPort: 2222 name: ascendjob-port if not set
                - containerPort: 2222         # determined by user
                  name: ascendjob-port        # do not modify
              resources:
                limits:
                  huawei.com/Ascend910: 8
                requests:
                  huawei.com/Ascend910: 8
              volumeMounts:
                - name: localtime
                  mountPath: /etc/localtime
          volumes:
            - name: localtime
              hostPath:
                path: /etc/localtime
    Worker:
      replicas: 7
      restartPolicy: Never
      template:
        metadata:
          labels:
            ring-controller.atlas: ascend-910b
        spec:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: job-name
                        operator: In
                        values:
                          - default-test-pytorch
                  topologyKey: kubernetes.io/hostname
          nodeSelector:
            host-arch: huawei-arm
            accelerator-type: module-910b-8
          containers:
            - name: ascend # do not modify
              image: ubuntu:22.04
              imagePullPolicy: IfNotPresent
              env:
                - name: POD_IP
                  valueFrom:
                    fieldRef:
                      fieldPath: status.podIP
                - name: XDL_IP                   # IP address of the physical node, which is used to identify the node where the pod is running
                  valueFrom:
                    fieldRef:
                      fieldPath: status.hostIP
                # ASCEND_VISIBLE_DEVICES env variable is used by ascend-docker-runtime when in the whole card scheduling scene with volcano scheduler. please delete it when in the static vNPU scheduling scene or without volcano.
                - name: ASCEND_VISIBLE_DEVICES
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['huawei.com/Ascend910']               # The value must be the same as resources.requests
                # 内存仿真配置
                - name: PYTORCH_NPU_ALLOC_CONF
                  value: expandable_segments:False
              command:                           # training command, which can be modified
                - /bin/bash
                - -c
              args: [ "sleep 100000; " ]
              ports:                          # default value containerPort: 2222 name: ascendjob-port if not set
                - containerPort: 2222         # determined by user
                  name: ascendjob-port        # do not modify
              resources:
                limits:
                  huawei.com/Ascend910: 8
                requests:
                  huawei.com/Ascend910: 8
              volumeMounts:
                - name: localtime
                  mountPath: /etc/localtime
                - name: ranktable
                  mountPath: /user/mindx/ranktable
          volumes:
            - name: localtime
              hostPath:
                path: /etc/localtime
            - name: ranktable           # 请勿修改此参数的默认值，Ascend Operator会用于检查是否开启文件挂载hccl.json。
              hostPath:
                path: /user/mindx-dl/ranktable/default.default-test-8x8